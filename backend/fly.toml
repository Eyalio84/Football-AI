# Fly.io Configuration for Football-AI Backend
# Deploy: fly launch --config fly.toml

app = "football-ai-api"
primary_region = "lhr"  # London — closest to Premier League

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[processes]
  app = "uvicorn main:app --host 0.0.0.0 --port 8000"
